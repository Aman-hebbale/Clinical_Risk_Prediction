version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # Application API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_started
    volumes:
      # Persist serialised model artefacts between container restarts.
      - ./models:/app/models
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: medpredict
      POSTGRES_USER: postgres
      # Password is injected from the .env file — never hard-coded here.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MLflow tracking server
  # ---------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlartifacts
    volumes:
      - mlflow_data:/mlartifacts
    restart: unless-stopped

volumes:
  pg_data:
  mlflow_data:
